# /etc/nginx/sites-available/ddotsjobs  (symlink into sites-enabled)
# Additive, isolated file. Touches ONLY ddotsjobs — never other vhosts.
# Reverse-proxies ddotsjobs.com -> PM2 ddotsjobs-web on 127.0.0.1:3100.

# Rate-limit zones for ddotsjobs (names prefixed to avoid collisions).
limit_req_zone $binary_remote_addr zone=ddotsjobs_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=ddotsjobs_auth:10m rate=5r/s;

upstream ddotsjobs_web {
    # 3100 is taken by another project on this host; ddotsjobs-web runs on 3107.
    server 127.0.0.1:3107;
    keepalive 32;
}

# ── HTTP -> HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ddotsjobs.com www.ddotsjobs.com;

    # ACME challenge for certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ddotsjobs.com$request_uri;
    }
}

# ── Canonical: www -> apex over HTTPS ────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.ddotsjobs.com;

    ssl_certificate     /etc/letsencrypt/live/ddotsjobs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ddotsjobs.com/privkey.pem;

    return 301 https://ddotsjobs.com$request_uri;
}

# ── Main HTTPS vhost ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ddotsjobs.com;

    ssl_certificate     /etc/letsencrypt/live/ddotsjobs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ddotsjobs.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:ddotsjobs_ssl:10m;
    ssl_session_timeout 1d;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cloudflare sits in front — trust its forwarded client IP.
    real_ip_header CF-Connecting-IP;

    client_max_body_size 12m;   # resume / logo uploads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # Next.js immutable build assets — long cache.
    location /_next/static/ {
        proxy_pass http://ddotsjobs_web;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Auth endpoints — tighter rate limit.
    location /api/auth/ {
        limit_req zone=ddotsjobs_auth burst=10 nodelay;
        proxy_pass http://ddotsjobs_web;
        include /etc/nginx/snippets/ddotsjobs-proxy.conf;
    }

    # tRPC / API.
    location /api/ {
        limit_req zone=ddotsjobs_api burst=40 nodelay;
        proxy_pass http://ddotsjobs_web;
        include /etc/nginx/snippets/ddotsjobs-proxy.conf;
    }

    # App.
    location / {
        proxy_pass http://ddotsjobs_web;
        include /etc/nginx/snippets/ddotsjobs-proxy.conf;
    }
}
