# /etc/nginx/sites-available/ddotsjobs  (symlink into sites-enabled)
# Additive, isolated file. Touches ONLY ddotsjobs — never other vhosts.
# SSL is terminated at Cloudflare (orange cloud); origin is HTTP-only on :80.

# Rate-limit zones for ddotsjobs (names prefixed to avoid collisions).
limit_req_zone $binary_remote_addr zone=ddotsjobs_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=ddotsjobs_auth:10m rate=5r/s;

upstream ddotsjobs_web {
    # ddotsjobs-web PM2 cluster (3100 was taken by another project).
    server 127.0.0.1:3107;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name ddotsjobs.com www.ddotsjobs.com;

    # ACME challenge (kept for any future direct cert issuance).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Cloudflare sits in front — trust its forwarded client IP header.
    real_ip_header CF-Connecting-IP;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 12m;   # resume / logo / voice uploads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # Next.js immutable build assets — long cache.
    location /_next/static/ {
        proxy_pass http://ddotsjobs_web;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check — no rate limit, no access log.
    location = /api/health {
        proxy_pass http://ddotsjobs_web;
        proxy_read_timeout 5s;
        access_log off;
        include /etc/nginx/snippets/ddotsjobs-proxy.conf;
    }

    # Auth endpoints — tighter rate limit.
    location /api/auth/ {
        limit_req zone=ddotsjobs_auth burst=10 nodelay;
        proxy_pass http://ddotsjobs_web;
        include /etc/nginx/snippets/ddotsjobs-proxy.conf;
    }

    # tRPC / API.
    location /api/ {
        limit_req zone=ddotsjobs_api burst=40 nodelay;
        proxy_pass http://ddotsjobs_web;
        include /etc/nginx/snippets/ddotsjobs-proxy.conf;
    }

    # App.
    location / {
        proxy_pass http://ddotsjobs_web;
        include /etc/nginx/snippets/ddotsjobs-proxy.conf;
    }
}
